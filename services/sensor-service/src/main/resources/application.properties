spring.application.name=sensor-service

# ===============================
# Application
# ===============================
server.port=8082

# ===============================
# Eureka Client
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===============================
# MySQL Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/sensor_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Ijse@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Scheduling Configuration
# ===============================
spring.task.scheduling.pool.size=5

# ===============================
# External IoT API Configuration
# ===============================
external.iot.base-url=http://104.211.95.241:8080/api
external.iot.device-id=YOUR_DEVICE_ID

# ===============================
# Automation Service URL
# ===============================
automation.service.url=http://automation-service/api/automation/process